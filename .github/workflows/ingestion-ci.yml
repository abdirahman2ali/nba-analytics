name: Ingestion CI

on:
  push:
    branches: [main]
    paths:
      - "ingestion/**"
  pull_request:
    branches: [main]
    paths:
      - "ingestion/**"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ingestion

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v

  investigate-on-failure:
    needs: [test]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CI investigator
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh workflow run watcher.yml --repo abdirahman2ali/ci-investigator
