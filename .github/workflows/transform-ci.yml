name: Transform CI

on:
  push:
    branches: [main]
    paths:
      - "transform/**"
  pull_request:
    branches: [main]
    paths:
      - "transform/**"

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: transform

    env:
      DATABRICKS_SERVER_HOSTNAME: ${{ secrets.DATABRICKS_SERVER_HOSTNAME }}
      DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-databricks

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          nba_dbt:
            target: ci
            outputs:
              ci:
                type: databricks
                host: "${DATABRICKS_SERVER_HOSTNAME}"
                http_path: "${DATABRICKS_HTTP_PATH}"
                token: "${DATABRICKS_TOKEN}"
                schema: nba
                threads: 2
          EOF

      - name: Install dbt packages
        run: dbt deps

      - name: dbt compile
        run: dbt compile

      - name: dbt run
        run: dbt run

      - name: dbt test
        run: dbt test

  investigate-on-failure:
    needs: [dbt-ci]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CI investigator
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh workflow run watcher.yml --repo abdirahman2ali/ci-investigator
